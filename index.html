<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to polyfill fetch in an environment where it's already defined but not writable.
      (function() {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(v) { currentFetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not polyfill fetch setter', e);
        }
      })();
    </script>
    <title>CalculatorDash - Professional Computation Network</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
